          items:
            type: string
    StatusCEM:
      type: object
      description: Model Represents Status Response of new CEM standard
      properties:
        Code:
          type: string
          description: Possible error codes
          example: MAPI-400
        SourceCode:
          type: string
          description: 'Error code repreents the gateway status. MAPI-000 means success, remaining are error.'
        SourceMessage:
          type: string
          description: Error description like success or Error.
          example: Success
        MessageAr:
          type: string
          description: Presentable error description in Arabic
          example: نجاح
        MessageEn:
          type: string
          description: Presentable error description in English
          example: Success
        Help:
          type: string
          description: Help URL or message if any
          example: For more information please check API docs
    CEM-AddShortCipherRequest:
      title: CEM-AddShortCipherRequest
      type: object
      properties:
        version:
          type: string
          example: v1
          default: v1
          description: This specifies which version of configuration to be used.
        journey:
          type: string
          example: Add Short Cipher
          description: ' This defines the JOURNEY of the use case.'
        operation:
          type: string
          example: ADD_SHORTCIPHER
          description: This defines the operation flow of use case.
        language:
          type: string
          example: en
          default: en
          description: Specifies the prefered language by caller
        cipher:
          type: string
          example: 345678
          description: Short Cipher for a given service number
        cNumber: 
          type: string
          example: 560510521
          description: service number
      required:
        - version
        - journey
        - operation
        - cipher
        - cNumber
      description: 'Model represents Adding a new Short Cipher. Here the cNumber represents user selected service number and cipher represents the Short Cipher'
   
    AddShortCipherResponse:
      title: AddShortCipherResponse
      type: object
      properties:
        status:
          type: string
          description: Status of adding Short Cipher
          example: "SUCCESS"
       
    CEM-AddShortCipherResponse:
      title: CEM-AddShortCipherResponse
      type: object
      description: CEM Add Short Cipher response
      properties:
        status:
          $ref: '#/components/schemas/StatusCEM'
        data:
          $ref: '#/components/schemas/AddShortCipherResponse'
  securitySchemes:
    Authorization:
      type: http
      scheme: bearer
  parameters:
    X-Correlation-Id:
      name: x-Correlation-Id
      in: header
      required: true
      schema:
        type: string
      description: Correlation ID of the (Correlation ID for the ongoing journey, in case of direct/single API call without journey, correlation and transaction ID can share the same value)
    X-Source-Channel:
      name: x-Source-Channel
      in: header
      required: true
      schema:
        type: string
        maxLength: 30
        minLength: 1
        example: Portal
      description: Mandatory attribute to identify the caller. Value has to be enriched by Apigee based on cem-key. Should not be provided by caller.
    X-Commercial-Id:
      name: x-Commercial-Id
      required: true
      in: header
      schema:
        type: string
        maxLength: 30
        minLength: 10
        example: 720755841
      description: 'Mandatory attribute to uniquely identify the API call, in case of direct/single API call without journey, correlation and transaction id can share same value.'
    X-Cem-Key:
      name: X-Cem-Key
      in: header
      required: true
      schema:
        type: string
      description: 'Channel Engagement Manager Key'
    channel:
      name: channel
      in: header
      required: true
      schema:
        type: string
        enum:
          - B2B-ANDROID
          - B2B-IOS
          - PORTAL
        example: B2B-ANDROID
      description: Requester  Channel
    referenceId:
      name: referenceId
      in: header
      required: true
      schema:
        type: string
        maxLength: 30
        minLength: 10
        example: 3ec16808-0f0f-4e7b-b22e-1817d7ee2342
      description: Unique reference id for each request
    User_id:
      name: User_id
      in: header
      required: true
      schema:
        type: string
      description: User_id of current user
  headers:
    X-Correlation-Id:
      required: true
      schema:
        type: string
        maxLength: 30
        minLength: 10
        example: 3ec16808-0f0f-4e7b-b22e-1817d7ee2342
      description: It is used for distributed tracing to correlate the related MS services calls and backend API calls (if possible) to make it easy for troubleshooting.
    X-Source-Channel:
      required: true
      schema:
        type: string
        maxLength: 30
        minLength: 1
        example: WEB
      description: Mandatory attribute to identify the caller
    X-Commercial-Id:
      required: true
      schema:
        type: string
        maxLength: 30
        minLength: 10
        example: 720755841
      description: 'Mandatory attribute to uniquely identify the API call, in case of direct/single API call without journey, correlation and transaction id can share same value.'
    X-Cem-Key:
      required: true
      schema:
        type: string
        maxLength: 30
        minLength: 10
        example: sr_123hg87asfafF32
      description: GUID reference for every response of the API consumer
