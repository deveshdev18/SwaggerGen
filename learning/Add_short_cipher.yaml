openapi: 3.0.1
info:
  title: Short Ciphers API
    
  description: |-
    Provides Short Cipher Information
  version: 1.0.0

  contact:
    name: dev
    email: dev@example.com
    
servers:
  - url: 'http://locahost:8000'
    description: DEV
  - url: ''
    description: SIT
  - url: ''
    description: PreProd
  - url: ''
    description: PROD
    
paths:
  /cem/bff/api/v1/shortcipher:
    post:
      summary: add Short Cipher
      operationId: add-cem-bff-shortciphers-v1-shortcipher
      responses:
        '200':
          $ref: '#/components/responses/200-CEM-AddShortCipherResponse'
        '400':
          $ref: '#/components/responses/CEM400-Error-Response'
        '401':
          $ref: '#/components/responses/CEM401-Error-Response'
        '403':
          $ref: '#/components/responses/CEM403-Error-Response'
        '404':
          $ref: '#/components/responses/CEM404-Error-Response'
        '405':
          $ref: '#/components/responses/CEM405-Error-Response'
        '409':
          $ref: '#/components/responses/409-Error-Response'
        '500':
          $ref: '#/components/responses/CEM500-Error-Response'
      description: "**Summary:**\n\n\t This API requests for adding a new Short Cipher in B2BPortal for the given account number {MSISDN / Service Account Number}. \n\n  * **Data Power API URLs:** \n \t\t \t\t <table><tr><td>**Production:**</td><td></td></tr><tr><td> **UAT:**</td><td> </td></tr><tr><td> **Pre-production:**</td><td></td></tr><tr><td> **SIT:**</td><td></td></tr><tr><td> **Development:**</td><td></td></tr></table> \n \t\t \t\t \n * **DB Tables:**\n\n\t\t Not Applicable  \n\n**Supported Authentications:**\n   * Full Login\n   * Quick Login"
      parameters:
        - $ref: '#/components/parameters/X-Correlation-Id'
        - $ref: '#/components/parameters/X-Source-Channel'
        - $ref: '#/components/parameters/X-Commercial-Id'
        - $ref: '#/components/parameters/X-Cem-Key'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CEM-AddShortCipherRequest'
            examples:
              Add Short Cipher Request with Service Number:
                value:
                  version: v1
                  journey: SHORTCIPHERS
                  operation: ADD_SHORT_CIPHER
                  language: en
                  shortCipher:
                    cipher: 34567
                    cNumber: 5667890
        description: ''
        
      tags:
        - Short Cipher Services
