      type: object
      title: ResponseStatus
      properties:
        statusCode:
          type: string
          description: |-
            * MBE_000: Operation completed successfully
            * MBE_300: The service is currently not available, please try again later
            * MBE_323: Sorry, you are not authorized
            * MBE_347: Resource not found
            * MBE_507: Required field/s is/are missing
